{% extends "base.html" %}

{% block title %}Login {% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <h1>Enter the lab</h1>
        <p>Log in after registration to reach the challenge home page and inspect how your profile is rendered.</p>
    </div>

    <form class="auth-card" method="post">
        <div class="form-header">
            <h2>Login</h2>
            <p>Use the account you created.</p>
        </div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Login</button>
        <p class="form-note">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
    </form>
</section>
{% endblock %}

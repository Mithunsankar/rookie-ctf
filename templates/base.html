<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}{% endblock %}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>
        <!-- do you know what is SSTI , if not search it 
         First understand how the website works and Start Hacking -->
        <div class="page-shell">
            <nav class="topbar" aria-label="Primary navigation">
                <a class="brand" href="{{ url_for('index') }}">
                    <span class="brand-mark">S</span>
                    
                </a>
                <div class="nav-actions">
                    {% if session.get("user_id") %}
                        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                        <a class="nav-link nav-link-strong" href="{{ url_for('logout') }}">Logout</a>
                    {% else %}
                        <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                        <a class="nav-link nav-link-strong" href="{{ url_for('register') }}">Register</a>
                    {% endif %}
                </div>
            </nav>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-stack" role="status" aria-live="polite">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <main>
                {% block content %}{% endblock %}
            </main>
        </div>
    </body>
</html>
